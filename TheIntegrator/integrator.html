<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="integrator.css">
  <title>Integrator</title>
</head>
<body>
  <h1>INTEGRATOR</h1>
  <div class="health-check-container">
    <p>Health check</p>
    <div class="databases">
      <div class="user-database js-users-database"></div>
      <div class="ticketing-system js-ticketing-system"></div>
      <div class="error-example js-error-example"></div>
    </div>
  </div>
  <div class="users-data-container">
    <div class="js-users-data"></div>
  </div>
  <div class="search-container">
    <input class="js-input" type="text" placeholder="Search user...">
    <button class="js-search-button">Search</button>
    <button class="js-reset-button">Reset</button>
    <p class="error-message js-error-search-message"></p>
  </div>
  <table class="data-table js-data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Username</th>
          <th>Email</th>
          <th>Address (Street)</th>
          <th>Phone number</th>
        </tr>
      </thead>
      <tbody class="js-users-table-body js-table-updated"></tbody>
  </table>
  <script src="integrator.js"></script>
</body>
</html>
